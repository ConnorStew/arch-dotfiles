---
# Main playbook. Run from system/:
#   ansible-galaxy collection install -r requirements.yml   # once
#   ansible-playbook site.yml --limit "$(uname -n)" --check --diff -K  # preview
#   ansible-playbook site.yml --limit "$(uname -n)" -K              # apply
- name: Configure the system layer
  hosts: all
  become: false
  # In --check previews, keep going past failures so the whole run is reported;
  # real applies still fail-fast.
  ignore_errors: "{{ ansible_check_mode }}"
  tasks:
    - name: Verify host_vars loaded for this machine
      ansible.builtin.assert:
        that:
          - packages_common is defined
          - packages_host is defined
          - aur_host is defined
          - xone_enabled is defined
        fail_msg: >-
          host_vars/{{ inventory_hostname }}.yml did not load — check that the
          inventory hostname matches `uname -n` and that you passed
          --limit "$(uname -n)".
        success_msg: "Scaffolding OK for {{ inventory_hostname }}."

    - name: SDDM display manager
      ansible.builtin.import_tasks: tasks/sddm.yml
    - name: Xone Xbox adapter
      ansible.builtin.import_tasks: tasks/xone.yml
    - name: Discord-update units
      ansible.builtin.import_tasks: tasks/discord-update.yml
    - name: Reflector mirrorlist
      ansible.builtin.import_tasks: tasks/reflector.yml
    - name: Claude remote-control (user service)
      ansible.builtin.import_tasks: tasks/claude-remote-control.yml
    - name: Packages (native/AUR/flatpak/npm)
      ansible.builtin.import_tasks: tasks/packages.yml

    #   - ansible.builtin.import_tasks: tasks/readme_steps.yml # Phase 5

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd_service:
        daemon_reload: true
      become: true
    - name: Update pacman cache
      community.general.pacman:
        update_cache: true
      become: true
