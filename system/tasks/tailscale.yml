- name: Enable tailscale service
  become: true
  ansible.builtin.systemd_service:
    name: tailscaled
    state: started
    enabled: true

- name: Enable systemd-resolved for MagicDNS
  become: true
  ansible.builtin.systemd_service:
    name: systemd-resolved
    state: started
    enabled: true

- name: Point /etc/resolv.conf at the resolved stub
  become: true
  ansible.builtin.file:
    src: /run/systemd/resolve/stub-resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: true

- name: Check tailscale status
  ansible.builtin.command: tailscale status --json
  register: ts_status
  changed_when: false
  failed_when: false
  check_mode: false

- name: Decide whether login is needed
  ansible.builtin.set_fact:
    ts_needs_login: >-
      {{ (ts_status.stdout | default('{}') | from_json).BackendState
         | default('NoState') != 'Running' }}

- name: Prompt for Tailscale auth key
  ansible.builtin.pause:
    prompt: "{{ inventory_hostname }} needs Tailscale login — paste auth key"
    echo: false
  register: ts_prompt
  when:
    - ts_needs_login
    - not ansible_check_mode

- name: Bring tailscale up
  become: true
  ansible.builtin.command: >
    tailscale up
      --auth-key={{ ts_prompt.user_input }}
      --hostname={{ inventory_hostname }}
  when:
    - ts_needs_login
    - not ansible_check_mode
  changed_when: true
  no_log: true

- name: Check current Tailscale operator
  ansible.builtin.command: tailscale debug prefs
  register: ts_prefs
  changed_when: false
  failed_when: false
  check_mode: false

- name: Allow the local user to operate Tailscale without sudo
  become: true
  ansible.builtin.command: >
    tailscale set --operator={{ ansible_facts['user_id'] }}
  when: >-
    ('"OperatorUser": "' ~ ansible_facts['user_id'] ~ '"') not in (ts_prefs.stdout | default(''))
  changed_when: true

# Adds an advertised subnet routes on this node.
# These must be approved in the web UI.
- name: Advertise subnet routes over Tailscale
  become: true
  ansible.builtin.command: >
    tailscale set --advertise-routes={{ tailscale_advertise_routes }}
  when:
    - tailscale_advertise_routes | length > 0
    - tailscale_advertise_routes not in (ts_prefs.stdout | default(''))
  changed_when: true

# Accept subnet routes advertised by other nodes.
- name: Accept subnet routes advertised over Tailscale
  become: true
  ansible.builtin.command: tailscale set --accept-routes
  when: >-
    '"RouteAll": true' not in (ts_prefs.stdout | default(''))
  changed_when: true

# Accept MagicDNS from the coordination server (resolves *.tail15b4a1.ts.net).
# Idempotent for nodes that were already up before --accept-dns was flipped on.
- name: Accept Tailscale MagicDNS
  become: true
  ansible.builtin.command: tailscale set --accept-dns=true
  when: >-
    '"CorpDNS": true' not in (ts_prefs.stdout | default(''))
  changed_when: true
