---
# Shared across all hosts.
# Per-host overrides/additions live in host_vars/<hostname>.yml.

discord_update_enabled: true   # both machines auto-update discord at boot

packages_common: [] # native pacman packages common to every machine
aur_packages: [] # AUR packages (via yay / kewlfft.aur)
flatpak_apps: [] # flatpak app IDs
npm_globals: [] # global npm packages
