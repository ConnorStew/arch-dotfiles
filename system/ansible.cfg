# Run from the system/ directory: `ansible-playbook site.yml --limit "$(uname -n)"`
[defaults]
inventory = inventory.yml
# TODO: Check if I need this roles path
roles_path = roles
nocows = true
interpreter_python = auto_silent
# Facts are gathered per play; cache them to speed up repeated --check runs.
gathering = smart

[privilege_escalation]
# Default to no root; individual tasks opt in with `become: true`.
become = false
