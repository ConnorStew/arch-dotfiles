# Styled to match the SDDM astronaut theme (Themes/jake_the_dog.conf):
# same background image, palette (#242455 bg / #d8d8ff text / #6c6caa placeholder)
# and Thunderman font, so the hyprlock screen looks like the SDDM greeter.
$bg = rgba(242455dd)
$text = rgba(d8d8ffff)
$placeholder = rgba(6c6caaff)
$accent = rgba(d8d8ffff)

background {
    monitor =
    path = /usr/share/sddm/themes/sddm-astronaut-theme/Backgrounds/jake_the_dog.png
    blur_passes = 2
    blur_size = 8
}

input-field {
    monitor =
    size = 300, 60
    outline_thickness = 3
    outer_color = $accent
    inner_color = $bg
    font_color = $text
    placeholder_text = Password...
    fade_on_empty = false
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = $text
    font_size = 90
    font_family = Thunderman
    position = 0, 160
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A %d %B"
    color = $text
    font_size = 24
    font_family = Thunderman
    position = 0, 70
    halign = center
    valign = center
}

# System buttons, matching the SDDM theme's power/reboot buttons (HideSystemButtons=false)
label {
    monitor =
    text = ⟳  Restart
    color = $placeholder
    font_size = 18
    font_family = Thunderman
    onclick = systemctl reboot
    position = -200, 40
    halign = right
    valign = bottom
}

label {
    monitor =
    text = ⏻  Shut Down
    color = $placeholder
    font_size = 18
    font_family = Thunderman
    onclick = systemctl poweroff
    position = -20, 40
    halign = right
    valign = bottom
}
