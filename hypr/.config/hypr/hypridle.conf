# Reacts to suspend (triggered by lid close, HandleLidSwitch=suspend in
# logind): before_sleep_cmd locks the session so hyprlock is already up by
# the time the lid reopens, instead of resuming unlocked.
general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

listener {
    timeout = 600 # 10 minutes
    on-timeout = loginctl lock-session
}
